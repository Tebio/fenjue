# FenJue Engine — Docker Compose
# ================================

version: "3.8"

services:
  fenjue-engine:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: fenjue-engine
    ports:
      - "8001:8001"
    volumes:
      # Score snapshots — persisted outside the container
      - /opt/data/fenjue/research/data/scores:/app/research/data/scores
      # Config — hot-reloaded on restart
      - /opt/data/fenjue/config:/app/config:ro
    environment:
      - FENJUE_ENV=${FENJUE_ENV:-production}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import httpx; httpx.get('http://localhost:8001/health').raise_for_status()"]
      interval: 30s
      timeout: 5s
      retries: 3

