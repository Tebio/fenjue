<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FenJue Console</title>
<script src="https://unpkg.com/htmx.org@2.0.4"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a0f;--card:#141420;--border:#252540;
  --text:#c0c0d0;--accent:#00d4aa;--danger:#ff4466;
  --warning:#ffaa33;--muted:#606078;
}
body{background:var(--bg);color:var(--text);font-family:"SF Mono","JetBrains Mono",monospace;font-size:13px;height:100vh;overflow:hidden}
.app{display:grid;grid-template-columns:200px 1fr 300px;height:100vh}
.sidebar{background:var(--card);border-right:1px solid var(--border);padding:16px 12px;overflow-y:auto}
.main{overflow-y:auto;padding:20px}
.right-panel{background:var(--card);border-left:1px solid var(--border);padding:16px;overflow-y:auto}
.nav-item{display:block;padding:8px 12px;margin:2px 0;border-radius:4px;color:var(--muted);text-decoration:none;cursor:pointer;transition:all .15s}
.nav-item:hover,.nav-item.active{color:var(--text);background:var(--border)}
.nav-item.active{border-left:2px solid var(--accent)}
.card{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:16px;margin-bottom:12px}
.card-title{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px}
.stat{font-size:24px;font-weight:600}
.stat-up{color:var(--accent)}.stat-down{color:var(--danger)}
.label{color:var(--muted);font-size:11px}
.badge-s{background:rgba(0,212,170,.1);color:var(--accent);padding:1px 8px;border-radius:3px;font-size:11px}
.badge-a{background:rgba(255,170,51,.1);color:var(--warning);padding:1px 8px;border-radius:3px;font-size:11px}
.badge-b{background:rgba(96,96,120,.1);color:var(--muted);padding:1px 8px;border-radius:3px;font-size:11px}
.star{color:var(--accent)}.star-empty{color:var(--muted)}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
table{width:100%;border-collapse:collapse}
th{text-align:left;color:var(--muted);font-weight:400;font-size:11px;padding:6px 8px;border-bottom:1px solid var(--border)}
td{padding:8px;border-bottom:1px solid rgba(37,37,64,.5);font-size:13px}
tr:hover{background:rgba(0,212,170,.03)}
@media(max-width:900px){.app{grid-template-columns:1fr}.sidebar,.right-panel{display:none}}
</style>
</head>
<body>
<div class="app">
  <nav class="sidebar">
    <div style="font-size:16px;font-weight:700;margin-bottom:20px;color:var(--accent)">焚訣 Console</div>
    <a class="nav-item active" hx-get="/console/dashboard" hx-target="#content">📡 Dashboard</a>
    <a class="nav-item" hx-get="/console/charts" hx-target="#content">📈 Charts</a>
    <a class="nav-item" hx-get="/console/settings" hx-target="#content">⚙️ Settings</a>
    <a class="nav-item" hx-get="/console/backtest" hx-target="#content">🔬 Backtest</a>
    <a class="nav-item" hx-get="/console/journal" hx-target="#content">📓 Journal</a>
    <a class="nav-item" hx-get="/console/report" hx-target="#content">📰 Report</a>
    <a class="nav-item" hx-get="/console/explain" hx-target="#content">🔍 Explain</a>
    <a class="nav-item" hx-get="/console/sim" hx-target="#content">🧪 Sim</a>
    <hr style="border-color:var(--border);margin:12px 0">
    <div style="font-size:11px;color:var(--muted)">Engine V1.0<br>localhost:8001</div>
  </nav>
  <main class="main" id="content" hx-get="/console/dashboard" hx-trigger="load"></main>
  <aside class="right-panel" id="copilot" hx-get="/console/copilot" hx-trigger="load">
  </aside>
</div>
<script>
document.querySelectorAll('.nav-item').forEach(el=>{
  el.addEventListener('click',()=>{
    document.querySelectorAll('.nav-item').forEach(e=>e.classList.remove('active'));
    el.classList.add('active');
  });
});
</script>
</body>
</html>
